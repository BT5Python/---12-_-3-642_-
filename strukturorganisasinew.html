<!DOCTYPE html>
<html>
<head>
  <title>Struktur Organisasi</title>
  <style>
    .box {
      border: 1px solid black;
      padding: 10px;
      margin: 10px;
      display: inline-block;
      cursor: pointer;
      background-color: #f0f0f0;
    }
  </style>
</head>
<body>

<h2>Struktur Organisasi</h2>

<div class="box" onclick="showInfo('ketua')">Ketua</div>
<div class="box" onclick="showInfo('wakil')">Wakil</div>
<div class="box" onclick="showInfo('sekretaris')">Sekretaris</div>

<p id="info"></p>

<script>
function showInfo(jabatan) {
  let text = "";
  if (jabatan === "ketua") {
    text = "Ketua: Bertanggung jawab penuh atas organisasi.";
  } else if (jabatan === "wakil") {
    text = "Wakil: Membantu ketua dalam tugas.";
  } else if (jabatan === "sekretaris") {
    text = "Sekretaris: Mengurus administrasi.";
  }
  document.getElementById("info").innerText = text;
}
</script>

</body>
</html>
