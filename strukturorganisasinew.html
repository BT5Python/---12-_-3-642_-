<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Struktur Organisasi</title>

<style>
body {
  font-family: Arial;
  text-align: center;
}

/* TREE */
.tree ul {
  padding-top: 20px;
  position: relative;
}

.tree li {
  display: inline-block;
  text-align: center;
  list-style-type: none;
  position: relative;
  padding: 20px 10px 0 10px;
}

/* garis */
.tree li::before, .tree li::after {
  content: '';
  position: absolute;
  top: 0;
  border-top: 2px solid #000;
  width: 50%;
  height: 20px;
}

.tree li::before {
  right: 50%;
}

.tree li::after {
  left: 50%;
}

.tree li:only-child::after,
.tree li:only-child::before {
  display: none;
}

.tree li:only-child {
  padding-top: 0;
}

.tree li:first-child::before,
.tree li:last-child::after {
  border: 0 none;
}

.tree li:last-child::before {
  border-right: 2px solid #000;
}

.tree li:first-child::after {
  border-left: 2px solid #000;
}

.tree ul ul::before {
  content: '';
  position: absolute;
  top: 0;
  left: 50%;
  border-left: 2px solid #000;
  width: 0;
  height: 20px;
}

/* BOX */
.box {
  border: 1px solid #000;
  display: inline-block;
  padding: 10px;
  min-width: 140px;
  background: white;
  cursor: pointer;
}

.title {
  background: #2da8d8;
  color: white;
  padding: 5px;
  font-size: 12px;
  font-weight: bold;
}

.nama {
  font-weight: bold;
  margin-top: 5px;
}

.ket {
  font-size: 11px;
}

/* POPUP */
.popup {
  display: none;
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.5);
}

.popup-content {
  background:white;
  padding:20px;
  margin:100px auto;
  width:300px;
  border-radius:10px;
}

.close {
  float:right;
  cursor:pointer;
  color:red;
}
</style>
</head>

<body>

<h2>STRUKTUR ORGANISASI</h2>

<div class="tree">
<ul>

  <!-- ATAS -->
  <li>
    <div class="box" onclick="showProfile('komandan')">
      <div class="title">KOMANDAN</div>
      <div class="nama">Erwan Andrian</div>
      <div class="ket">Marsekal Pertama</div>
    </div>

    <ul>
      <!-- LEVEL 2 -->
      <li>
        <div class="box" onclick="showProfile('kadis1')">
          <div class="title">KADIS A</div>
          <div class="nama">Budi</div>
        </div>

        <ul>
          <li>
            <div class="box" onclick="showProfile('staff1')">
              <div class="title">STAFF</div>
              <div class="nama">Andi</div>
            </div>
          </li>
        </ul>
      </li>

      <li>
        <div class="box" onclick="showProfile('kadis2')">
          <div class="title">KADIS B</div>
          <div class="nama">Siti</div>
        </div>
      </li>

      <li>
        <div class="box" onclick="showProfile('kadis3')">
          <div class="title">KADIS C</div>
          <div class="nama">Rina</div>
        </div>
      </li>

    </ul>
  </li>

</ul>
</div>

<!-- POPUP -->
<div id="popup" class="popup">
  <div class="popup-content">
    <span class="close" onclick="closePopup()">X</span>
    <h3 id="nama"></h3>
    <p id="jabatan"></p>
    <p id="deskripsi"></p>
  </div>
</div>

<script>
function showProfile(id) {
  let data = {
    komandan: {
      nama: "Erwan Andrian",
      jabatan: "Komandan",
      deskripsi: "Memimpin organisasi"
    },
    kadis1: {
      nama: "Budi",
      jabatan: "Kadis A",
      deskripsi: "Mengelola divisi A"
    },
    kadis2: {
      nama: "Siti",
      jabatan: "Kadis B",
      deskripsi: "Mengelola divisi B"
    },
    kadis3: {
      nama: "Rina",
      jabatan: "Kadis C",
      deskripsi: "Mengelola divisi C"
    },
    staff1: {
      nama: "Andi",
      jabatan: "Staff",
      deskripsi: "Membantu operasional"
    }
  };

  document.getElementById("nama").innerText = data[id].nama;
  document.getElementById("jabatan").innerText = data[id].jabatan;
  document.getElementById("deskripsi").innerText = data[id].deskripsi;

  document.getElementById("popup").style.display = "block";
}

function closePopup() {
  document.getElementById("popup").style.display = "none";
}
</script>

</body>
</html>
